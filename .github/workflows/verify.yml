name: verify

on:
  push:
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Mechanical audit (offline, stdlib, no API key)
        run: python3 tests/verify.py
      - name: Self-test — the verifier must reject broken material
        run: python3 tests/verify.py --selftest
